# WindowSnap Configuration
# Edit this file to customize layouts, hotkeys, and window matching rules.
# After editing, use "Reload Config" from the tray menu (no restart needed).

settings:
  taskbar_offset: auto  # auto-detect taskbar height and position
  gap: 5                # pixel gap between windows (looks cleaner)

layouts:
  # Primary dev layout — Claude | VS Code | Terminal | Browser
  4-column-dev:
    hotkey: ctrl+alt+1
    monitor: 0
    columns:
      - width_percent: 25
        match:
          - title_contains: "Claude"
      - width_percent: 25
        match:
          - title_contains: "Visual Studio Code"
      - width_percent: 25
        match:
          - title_contains: "Terminal"
          - title_contains: "PowerShell"
          - title_contains: "Command Prompt"
      - width_percent: 25
        match:
          - title_contains: "Brave"
          - title_contains: "Chrome"
          - title_contains: "Firefox"
          - title_contains: "Edge"

  # Chat + browse — Signal | Claude | Brave (half screen)
  chat-browse:
    hotkey: ctrl+alt+2
    monitor: 0
    columns:
      - width_percent: 25
        match:
          - title_contains: "Signal"
      - width_percent: 25
        match:
          - title_contains: "Claude"
      - width_percent: 50
        match:
          - title_contains: "Brave"
          - title_contains: "Chrome"
          - title_contains: "Firefox"
          - title_contains: "Edge"

  # BlueStacks — up to 4 instances, 25% each. Unused slots just get skipped.
  bluestacks:
    hotkey: ctrl+alt+3
    monitor: 0
    columns:
      - width_percent: 25
        match:
          - process_name: "HD-Player.exe"
      - width_percent: 25
        match:
          - process_name: "HD-Player.exe"
      - width_percent: 25
        match:
          - process_name: "HD-Player.exe"
      - width_percent: 25
        match:
          - process_name: "HD-Player.exe"

# ───────────────────────────────────────────────────────────
# HOW TO ADD A CUSTOM LAYOUT:
#
#   my-custom-layout:
#     hotkey: ctrl+alt+3          # pick any unused combo
#     monitor: 0                  # 0 = primary, 1 = secondary, etc.
#     columns:
#       - width_percent: 40
#         match:
#           - title_contains: "Slack"
#       - width_percent: 60
#         match:
#           - title_contains: "Chrome"
#
# Match rules are OR'd — the first window matching any rule gets placed.
# Two match types: title_contains (window title) and process_name (exe name).
# Every column NEEDS match rules to work. Empty match: [] = skip (does nothing).
# ───────────────────────────────────────────────────────────
